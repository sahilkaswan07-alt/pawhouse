name: Send WhatsApp vaccination & deworming reminders

on:
  schedule:
    # Runs daily at 09:00 IST (03:30 UTC). Edit the cron below to change the time.
    # Cron time is always UTC — https://crontab.guru is handy for converting.
    - cron: '30 3 * * *'
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab to test

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Send due reminders
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM: ${{ secrets.TWILIO_WHATSAPP_FROM }}
          TIMEZONE: Asia/Kolkata
        run: node send-reminders.js
