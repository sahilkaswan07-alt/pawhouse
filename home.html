<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paw House — Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="home.css">
  <style>
    /* ===== CARE REMINDER BELL — mirrors the bell on each pet's own page.
       Counted LIVE from the hidden <span> list inside each pet-box below
       (see "CARE REMINDER DATA" comments), NOT from localStorage — that
       way it's always correct even if that pet's own page was never
       opened on this device. Keep each pet's list in sync with the
       vaccination/deworming rows in their petbox.html: delete a <span>
       here the moment that row is marked Done there. ===== */
    .pet-box{ position:relative; }
    .care-bell{
      position:absolute; top:10px; right:10px; z-index:5;
      width:34px; height:34px; border-radius:50%;
      background:#1b1e27; border:1.5px solid rgba(244,162,77,.4);
      display:none; align-items:center; justify-content:center;
      font-size:16px; box-shadow:0 4px 12px rgba(0,0,0,.35);
    }
    .care-bell.show{ display:flex; }
    .care-bell.has-due{ animation:careBellPulse 1.6s ease-in-out infinite; }
    @keyframes careBellPulse{
      0%,100%{ box-shadow:0 4px 12px rgba(0,0,0,.35), 0 0 0 0 rgba(224,90,90,.45); }
      50%{ box-shadow:0 4px 12px rgba(0,0,0,.35), 0 0 0 7px rgba(224,90,90,0); }
    }
    .care-bell-badge{
      position:absolute; top:-4px; right:-4px; min-width:17px; height:17px;
      padding:0 4px; border-radius:9px; background:#e05a5a; color:#fff;
      font-family:'Inter',sans-serif; font-size:10px; font-weight:700;
      display:flex; align-items:center; justify-content:center;
      border:2px solid #0d0f14;
    }
  </style>
</head>
<body>
 
  <canvas id="bg-canvas"></canvas>
 
  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="home.html" class="nav-logo">🐾 Paw House</a>
    <ul class="nav-links">
      <li><a href="home.html"><span class="nav-text">Home</span></a></li>
      <li><a href="#pets-section"><span class="nav-text">Our Pets</span></a></li>
      <li><a href="landing.html"><span class="nav-text">About</span></a></li>
      <li><a href="landing.html" class="nav-cta">Register</a></li>
    </ul>
  </nav>
 
  <!-- OUR PETS -->
  <section class="pets-section" id="pets-section">
    <div class="sec-head">
      <h2>Our Registered Pets 🐾</h2>
      <p>Each box belongs to a registered pet — owners can open theirs with their password.</p>
    </div>
    <div class="pets-grid">
 
      <!-- ===================== PET BOX — copy & paste this block for each new pet =====================
           To add a new pet:
             1. Copy this block.
             2. Replace every "bruno" below with the new pet's id — that's
                data-pet-id, the openBox(...) args, and the two bell
                element ids (careBell-bruno / careBellBadge-bruno).
             3. Update photo/name/breed/chips further down.
             4. Add that same id as a new entry in pet-schedules.js.
           The bell itself needs NO manual editing beyond renaming those
           two ids — its count is read live from pet-schedules.js, the
           same file the pet's own petbox page reads from. -->
      <div class="pet-box" data-pet-id="bruno" onclick="openBox('bruno123', 'petbox.html?id=bruno')">
        <div class="care-bell" id="careBell-bruno" title="Care reminder">🔔<span class="care-bell-badge" id="careBellBadge-bruno">0</span></div>
        <img class="pet-photo" src="bruno.png" alt="Bruno">
        <div class="pet-info">
          <div class="pet-name">Bruno</div>
          <div class="pet-breed">Pit-Bull</div>
          <div class="pet-meta">
            <span class="pet-chip sex">Male</span>
            <span class="pet-chip age">2 yrs</span>
          </div>
          <div class="lock-btn">🔒 Open Box</div>
        </div>
      </div>
      <!-- ============================================================================================== -->
 











    </div>
  </section>
 
  <footer class="footer">
    <p>© <span id="year"></span> Paw House. Made with 🐾 for happy pets.</p>
  </footer>
 
  <!-- PASSWORD MODAL -->
  <div class="pbm-overlay" id="pbmOverlay">
    <div class="pbm">
      <h3>Enter Box Password</h3>
      <input type="password" id="pbmInput" placeholder="Password">
      <div class="pbm-err" id="pbmErr"></div>
      <div class="pbm-btn-row">
        <button class="pbm-cancel" onclick="closeBox()">Cancel</button>
        <button class="pbm-unlock" onclick="tryUnlock()">Unlock 🔓</button>
      </div>
    </div>
  </div>
 
<script src="pet-schedules.js"></script>
<script>
  /* ===== BACKGROUND CANVAS ===== */
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H;
  const FOCAL = 560;
  const COLS = [[244,162,77],[224,123,123],[201,111,208],[100,160,255]];
  function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  function mkRing(i){ const col=COLS[i%COLS.length]; return {radius:180+i*70,tilt:(i*0.6)+Math.random()*0.4,spin:(Math.random()-.5)*0.012+0.004,rot:Math.random()*Math.PI*2,points:64,col,nodeOffset:Math.random()*Math.PI*2}; }
  let rings=[];
  function init(){ rings=Array.from({length:6},(_,i)=>mkRing(i)); }
  let mouse={tx:0,ty:0.25}, camRotY=0, camRotX=0.25;
  function project3D(x,y,z){ const cosY=Math.cos(camRotY),sinY=Math.sin(camRotY); let x1=x*cosY-z*sinY,z1=x*sinY+z*cosY; const cosX=Math.cos(camRotX),sinX=Math.sin(camRotX); let y1=y*cosX-z1*sinX,z2=y*sinX+z1*cosX; const scale=FOCAL/(FOCAL+z2+500); return{sx:W*.5+x1*scale,sy:H*.5+y1*scale,scale,z:z2}; }
  function drawBlobs(t){ [{cx:W*.30+Math.sin(t*.30)*110,cy:H*.42+Math.cos(t*.20)*75,r:320,col:'244,162,77',a:.07},{cx:W*.72+Math.cos(t*.25)*90,cy:H*.60+Math.sin(t*.32)*65,r:250,col:'201,111,208',a:.07},{cx:W*.52+Math.sin(t*.18)*70,cy:H*.24+Math.cos(t*.22)*55,r:190,col:'100,160,255',a:.05}].forEach(({cx,cy,r,col,a})=>{ const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r); g.addColorStop(0,`rgba(${col},${a})`); g.addColorStop(1,'transparent'); ctx.fillStyle=g; ctx.fillRect(0,0,W,H); }); }
  function drawVignette(){ const g=ctx.createRadialGradient(W/2,H/2,H*.06,W/2,H/2,H*.80); g.addColorStop(0,'rgba(13,15,20,0)'); g.addColorStop(1,'rgba(13,15,20,.85)'); ctx.fillStyle=g; ctx.fillRect(0,0,W,H); }
  let t=0;
  function animate(){ requestAnimationFrame(animate); t+=.007; camRotY+=(mouse.tx-camRotY)*.02; camRotX+=(mouse.ty-camRotX)*.02; ctx.fillStyle='#0d0f14'; ctx.fillRect(0,0,W,H); drawBlobs(t); const drawables=[]; rings.forEach(ring=>{ ring.rot+=ring.spin; const pts=[]; for(let p=0;p<=ring.points;p++){ const a=(p/ring.points)*Math.PI*2; const rx=Math.cos(a)*ring.radius,ry=Math.sin(a)*ring.radius*Math.sin(ring.tilt),rz=Math.sin(a)*ring.radius*Math.cos(ring.tilt); const cs=Math.cos(ring.rot),sn=Math.sin(ring.rot); pts.push(project3D(rx*cs-rz*sn,ry,rx*sn+rz*cs)); } const avgZ=pts.reduce((s,p)=>s+p.z,0)/pts.length; drawables.push({ring,pts,avgZ}); const na=ring.nodeOffset+t*1.3; const nrx=Math.cos(na)*ring.radius,nry=Math.sin(na)*ring.radius*Math.sin(ring.tilt),nrz=Math.sin(na)*ring.radius*Math.cos(ring.tilt); const cs=Math.cos(ring.rot),sn=Math.sin(ring.rot); const node=project3D(nrx*cs-nrz*sn,nry,nrx*sn+nrz*cs); drawables.push({node,ring,avgZ:node.z,isNode:true}); }); drawables.sort((a,b)=>a.avgZ-b.avgZ); drawables.forEach(d=>{ if(d.isNode){ const{node,ring}=d; const depth=Math.max(0,Math.min(1,(node.z+500)/900)); const r=3+depth*4,alpha=.25+depth*.6; const halo=ctx.createRadialGradient(node.sx,node.sy,0,node.sx,node.sy,r*4); halo.addColorStop(0,`rgba(${ring.col[0]},${ring.col[1]},${ring.col[2]},${(alpha*.5).toFixed(3)})`); halo.addColorStop(1,'transparent'); ctx.fillStyle=halo; ctx.beginPath(); ctx.arc(node.sx,node.sy,r*4,0,Math.PI*2); ctx.fill(); ctx.fillStyle=`rgba(255,255,255,${alpha.toFixed(3)})`; ctx.beginPath(); ctx.arc(node.sx,node.sy,Math.max(r,1),0,Math.PI*2); ctx.fill(); } else { const{ring,pts}=d; const depth=Math.max(0,Math.min(1,(d.avgZ+500)/900)); ctx.beginPath(); ctx.strokeStyle=`rgba(${ring.col[0]},${ring.col[1]},${ring.col[2]},${(.08+depth*.22).toFixed(3)})`; ctx.lineWidth=.8+depth*1.2; pts.forEach((p,idx)=>idx===0?ctx.moveTo(p.sx,p.sy):ctx.lineTo(p.sx,p.sy)); ctx.stroke(); } }); drawVignette(); }
  window.addEventListener('mousemove',e=>{ mouse.tx=((e.clientX/W)-.5)*0.6; mouse.ty=0.25+((e.clientY/H)-.5)*0.4; });
  window.addEventListener('mouseleave',()=>{ mouse.tx=0; mouse.ty=0.25; });
  resize(); init(); animate();
  window.addEventListener('resize',()=>{ resize(); init(); });
 
  /* ===== FOOTER YEAR ===== */
  document.getElementById('year').textContent = new Date().getFullYear();

  /* ===== CARE REMINDER BELLS =====
     Fully automatic — no per-pet data to maintain in this file anymore.

     1. Which pets exist is read straight from the DOM: every
        `.pet-box[data-pet-id]` on the page (so a newly copy-pasted pet
        box is picked up with zero extra JS/HTML edits here).
     2. Each pet's vaccination/deworming items come from
        window.PET_SCHEDULES (pet-schedules.js) — the SAME file that pet's
        own petbox page reads from, so the two can never disagree.
     3. Anything the owner has tapped "Done" on that pet's own petbox page
        is read from the same "pawhouse_status_<petId>" localStorage key
        that page writes to, and subtracted here — so completing it there
        removes it from the home page bell too, without editing this file. */

  function loadStatusOverrides(petId) {
    try {
      const raw = localStorage.getItem(`pawhouse_status_${petId}`);
      return raw ? JSON.parse(raw) : {};
    } catch (e) {
      return {};
    }
  }

  // Merges pet-schedules.js baseline data with any localStorage overrides,
  // then returns just the items that are still pending (not "done").
  function getPendingItems(petId) {
    const schedule = window.PET_SCHEDULES && window.PET_SCHEDULES[petId];
    if (!schedule) return [];
    const overrides = loadStatusOverrides(petId);
    const all = [...(schedule.vaccination || []), ...(schedule.deworming || [])];
    return all
      .map(item => {
        const saved = overrides[item.id];
        return saved ? { ...item, status: saved.cls } : item;
      })
      .filter(item => item.status !== 'done');
  }

  function renderCareBells() {
    document.querySelectorAll('.pet-box[data-pet-id]').forEach(box => {
      const id = box.dataset.petId;
      const bell = document.getElementById(`careBell-${id}`);
      const badge = document.getElementById(`careBellBadge-${id}`);
      if (!bell || !badge) return;

      const items = getPendingItems(id);
      const count = items.length;
      const urgent = items.some(item => item.status === 'due' || item.status === 'miss');

      if (count > 0) {
        bell.classList.add('show');
        bell.classList.toggle('has-due', urgent);
        badge.textContent = count > 9 ? '9+' : String(count);
      } else {
        // No pending items left for this pet — bell disappears
        bell.classList.remove('show', 'has-due');
      }
    });
  }

  renderCareBells();
  // Pick up a status change made on a pet's own page in another tab, and
  // re-check whenever this tab regains focus.
  window.addEventListener('storage', renderCareBells);
  window.addEventListener('focus', renderCareBells);
 
  /* ===== PASSWORD MODAL ===== */
  let _pass = '', _url = '';
 
  function openBox(password, redirectUrl) {
    _pass = password;
    _url  = redirectUrl;
    document.getElementById('pbmInput').value = '';
    document.getElementById('pbmErr').textContent = '';
    document.getElementById('pbmOverlay').classList.add('open');
  }
  function closeBox() {
    document.getElementById('pbmOverlay').classList.remove('open');
  }
  function tryUnlock() {
    if (document.getElementById('pbmInput').value === _pass) {
      window.location.href = _url;
    } else {
      document.getElementById('pbmErr').textContent = 'Incorrect password. Try again.';
    }
  }
  // Allow Enter key to submit
  document.getElementById('pbmInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') tryUnlock();
  });
</script>
<script src="petschedules.js"></script>
</body>
</html>
